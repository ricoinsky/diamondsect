<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diamondsect | Joias</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-category="joias">
  <div class="topbar" role="region" aria-label="Avisos">
    <div class="topbar__track">
      <span>FRETE GRÁTIS | GARANTIA DE 30 DIAS</span>
      <span>CUPOM DE PRIMEIRA COMPRA</span>
      <span>PARCELE EM ATÉ 12X NO CARTÃO</span>
      <span>COMPRA SEGURA</span>
    </div>
  </div>

  <header class="header" role="banner">
    <div class="header__inner">
      <div class="header__left" aria-hidden="true"></div>
      <a class="brand" href="index.html">DIAMONDSECT</a>

      <div class="header__right">
        <form class="search search--inline" action="#" onsubmit="event.preventDefault();">
          <span class="search__icon" aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="O que você está buscando?" autocomplete="off" />
          <button class="search__btn" type="button" title="Pesquisar">Buscar</button>
        </form>

        <a class="cartbtn cartbtn--premium" href="carrinho.html">
          <span class="cartbtn__label">Meu carrinho</span>
          <span class="cartcount">0</span>
        </a>
      </div>
    </div>

    <nav class="nav" aria-label="Navegação principal">
      <a href="index.html">Início</a>
      <a href="ternos.html">Ternos</a>
      <a href="perfumaria.html">Perfumaria</a>
      <a class="is-active" href="joias.html">Joias</a>
      <a href="index.html#suporte">Suporte</a>
      <a href="index.html#rastrear">Rastrear pedido</a>
    </nav>
  </header>

  <section class="section">
    <div class="section__head">
      <h2>Joias</h2>
      <a class="link" href="index.html#produtos">Voltar</a>
    </div>

    <div class="toolbar">
      <div class="count" id="resultCount">0 item(s)</div>
      <div class="sort">
        <label for="sortSelect">Ordenar:</label>
        <select id="sortSelect">
          <option value="best">Mais vendidos</option>
          <option value="low">Menor preço</option>
          <option value="high">Maior preço</option>
        </select>
      </div>
    </div>

    <div class="grid" id="shopGrid"></div>
  </section>

  <script src="js/shop.js"></script>
</body>
</html>
